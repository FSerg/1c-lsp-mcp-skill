name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build WASM frontend once (platform-independent) ───────────────────
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: frontend

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dioxus-cli
        run: cargo install dioxus-cli --version 0.6.3 --locked

      - name: Build frontend
        run: |
          cd crates/frontend
          npm ci
          npm run build:css
          dx build --platform web --package lsp-skill-frontend --bin lsp-skill-frontend --release
          cd ../..
          mkdir -p target/frontend-dist
          cp -R target/dx/lsp-skill-frontend/release/web/public/. target/frontend-dist/
          mkdir -p target/frontend-dist/assets
          cp crates/frontend/assets/app.css target/frontend-dist/assets/app.css

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: target/frontend-dist

  # ── Build platform binaries ───────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ── Download pre-built frontend ─────────────────────────────────────
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: target/frontend-dist

      # ── Build binaries ───────────────────────────────────────────────────
      - name: Build server & CLI
        run: cargo build --release --target ${{ matrix.target }} -p lsp-skill-server -p lsp-skill-cli

      # ── Assemble bundle ──────────────────────────────────────────────────
      - name: Assemble bundle (unix)
        if: runner.os != 'Windows'
        run: |
          OUT="target/release-bundle/${{ matrix.target }}"
          mkdir -p "$OUT"
          cp "target/${{ matrix.target }}/release/lsp-skill-server" "$OUT/"
          cp "target/${{ matrix.target }}/release/lsp-skill" "$OUT/"
          cp dist/.env.example "$OUT/"
          cp dist/AGENTS-skills.md "$OUT/"
          cp dist/AGENTS-mcp.md "$OUT/"
          cp -R dist/skills "$OUT/skills"
          if [ -f dist/README.html ]; then cp dist/README.html "$OUT/"; fi
          if ls dist/pics/* &>/dev/null; then mkdir -p "$OUT/pics" && cp dist/pics/* "$OUT/pics/"; fi
          cd target/release-bundle
          tar -czf "lsp-skill-${{ matrix.target }}.tar.gz" "${{ matrix.target }}"

      - name: Assemble bundle (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          OUT="target/release-bundle/${{ matrix.target }}"
          mkdir -p "$OUT"
          cp "target/${{ matrix.target }}/release/lsp-skill-server.exe" "$OUT/"
          cp "target/${{ matrix.target }}/release/lsp-skill.exe" "$OUT/"
          cp dist/.env.example "$OUT/"
          cp dist/AGENTS-skills.md "$OUT/"
          cp dist/AGENTS-mcp.md "$OUT/"
          cp -R dist/skills "$OUT/skills"
          if [ -f dist/README.html ]; then cp dist/README.html "$OUT/"; fi
          if ls dist/pics/* &>/dev/null; then mkdir -p "$OUT/pics" && cp dist/pics/* "$OUT/pics/"; fi
          cd target/release-bundle
          7z a -tzip "lsp-skill-${{ matrix.target }}.zip" "${{ matrix.target }}"

      # ── Upload artifact ──────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsp-skill-${{ matrix.target }}
          path: target/release-bundle/lsp-skill-${{ matrix.target }}.${{ matrix.archive }}

  # ── Create GitHub Release ────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Read tag annotation
        id: tag_notes
        shell: bash
        run: |
          TAG_MESSAGE="$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")"
          {
            echo 'body<<EOF'
            printf '%s\n' "$TAG_MESSAGE"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: ${{ steps.tag_notes.outputs.body }}
          files: artifacts/*
